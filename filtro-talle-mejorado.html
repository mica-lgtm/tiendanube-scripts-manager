<!-- FILTRO DE TALLE MEJORADO Y MODERNO -->
<style>
  .size-filter-section {
    background: linear-gradient(135deg, #fff5f4 0%, #ffffff 100%);
    border-radius: 12px;
    padding: 24px;
    margin: 20px 0;
    border: 2px solid #ffb7b0;
    box-shadow: 0 2px 8px rgba(255, 183, 176, 0.1);
  }

  .size-filter-title {
    font-size: 18px;
    font-weight: 700;
    color: #2e2e2e;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .size-filter-title:before {
    content: '👕';
    font-size: 22px;
  }

  .size-options {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 12px;
  }

  .size-option {
    position: relative;
  }

  .size-option input[type="checkbox"] {
    display: none;
  }

  .size-option label {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 8px;
    background: white;
    border: 2px solid #ddd;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 500;
    font-size: 14px;
    color: #2e2e2e;
    min-height: 80px;
    position: relative;
  }

  .size-option label:hover {
    border-color: #ffb7b0;
    background: #fff5f4;
    transform: translateY(-2px);
  }

  .size-option input[type="checkbox"]:checked + label {
    background: linear-gradient(135deg, #ffb7b0 0%, #ff9d94 100%);
    border-color: #ff8b7e;
    color: white;
    box-shadow: 0 4px 12px rgba(255, 183, 176, 0.4);
  }

  .size-label {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 4px;
    color: #2e2e2e;
  }

  .size-stock {
    font-size: 12px;
    opacity: 0.7;
    color: #2e2e2e;
  }

  .size-option input[type="checkbox"]:checked + label .size-stock {
    opacity: 0.9;
  }

  .size-filter-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid #ffb7b0;
  }

  .btn-apply {
    flex: 1;
    padding: 12px 20px;
    background: linear-gradient(135deg, #ffb7b0 0%, #ff9d94 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 14px;
  }

  .btn-apply:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(255, 183, 176, 0.4);
  }

  .btn-clear {
    padding: 12px 20px;
    background: white;
    color: #2e2e2e;
    border: 2px solid #ffb7b0;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 14px;
  }

  .btn-clear:hover {
    border-color: #ff9d94;
    background: #fff5f4;
    color: #2e2e2e;
  }

  .size-counter {
    background: #fff5f4;
    color: #ffb7b0;
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    margin-left: auto;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .size-options {
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 10px;
    }

    .size-filter-actions {
      flex-direction: column;
    }

    .size-option label {
      min-height: 70px;
      padding: 10px 6px;
    }
  }

  /* Animación de carga */
  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .size-filter-section {
    animation: slideIn 0.3s ease forwards;
  }
</style>

<div class="size-filter-section">

  <div class="size-filter-actions">
    <button class="btn-apply" onclick="applyFilter()">Aplicar filtro</button>
    <button class="btn-clear" onclick="clearFilter()">Limpiar</button>

<script>
  // Actualizar contador
  function updateCounter() {
    const selected = document.querySelectorAll('#sizeOptions input[type="checkbox"]:checked').length;
    const counter = document.getElementById('sizeCounter');
    if (selected > 0) {
      counter.textContent = selected + ' seleccionado' + (selected !== 1 ? 's' : '');
      counter.style.display = 'inline-block';
    } else {
      counter.textContent = '0 seleccionados';
    }
  }

  // Aplicar filtro
  function applyFilter() {
    const selected = Array.from(document.querySelectorAll('#sizeOptions input[type="checkbox"]:checked'))
      .map(el => el.value);

    if (selected.length > 0) {
      console.log('Filtros seleccionados:', selected);
      // Aquí iría la lógica para filtrar productos
      // Esto dependerá de tu tienda TiendaNube
      alert('Filtrando por: ' + selected.join(', '));
    }
  }

  // Limpiar filtro
  function clearFilter() {
    document.querySelectorAll('#sizeOptions input[type="checkbox"]').forEach(el => el.checked = false);
    updateCounter();
  }

  // Escuchar cambios
  document.querySelectorAll('#sizeOptions input[type="checkbox"]').forEach(el => {
    el.addEventListener('change', updateCounter);
  });

  // Inicializar
  updateCounter();
</script>
